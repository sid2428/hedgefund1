name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A new push to the same branch cancels an in-flight run; there is no value in
# finishing CI for a commit that has already been superseded.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.8.4

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .
        continue-on-error: true # advisory until the tree is fully formatted

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # pyproject requires >=3.11. Both are tested because the dependency
        # pins have differing wheel coverage across the two.
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        # The suite runs against in-memory SQLite (configured in
        # tests/conftest.py), so no Postgres or Redis service is required.
        # Keys are dummies; every external call is mocked.
        env:
          ENVIRONMENT: development
          GROQ_API_KEY: ci-test-key
          OPENAI_API_KEY: ci-test-key
          EDGAR_USER_AGENT: "Mosaic CI ci@example.com"
        run: python -m pytest tests/ -v --tb=short
